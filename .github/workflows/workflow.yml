name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - run: pip install flake8 nose

      - name: Lint with flake8
        run: flake8 .

      - name: Run unit tests with nose
        run: nosetests
